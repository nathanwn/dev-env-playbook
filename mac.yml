---
- name: Development environment playbook.
  hosts: all
  vars_files:
    - config.yml
    - env.yml
  vars:
    integration_testing: false
  environment: "{{ env }}"

  gather_facts: true

  pre_tasks:
    - name: Display system info.
      ansible.builtin.debug:
        msg: "{{ item }}"
      loop:
        - ansible_os_family = {{ ansible_os_family }}
        - ansible_distribution == {{ ansible_distribution }}
        - ansible_distribution_major_version == {{ ansible_distribution_major_version }}
        - ansible_facts.kernel = {{ ansible_facts["kernel"] }}
        - ansible_facts.virtualization_role = {{ ansible_facts["virtualization_role"] }}
        # This is not available on MacOS.
        # - ansible_facts.system_vendor = {{ ansible_facts["system_vendor"] }}
      tags:
        - always

  tasks:
    - name: Install packages
      community.general.homebrew:
        name: "{{ item }}"
        state: present
      # Workaround: The homebrew module currently treats "already installed" warnings as failures.
      # We override the failure condition to ignore errors when the package is already installed.
      failed_when:
        # The | default(...) filter prevents undefined variable errors if the task succeeds and doesn't return 'failed' or 'msg' keys
        - failed | default(false)
        - '"already installed" not in msg | default("")'
      loop:
        - fzf
        - gnu-sed
        - hugo
        - lazygit
        - pandoc
        - python@3.11
        - python@3.12
        - python@3.13
        - python@3.14
        - tmux

  roles:
    - role: preinstall
